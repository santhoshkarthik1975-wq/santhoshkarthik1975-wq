<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">

  <!-- Background -->
  <defs>
    <!-- Gradient for the background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0B1120" />
    </linearGradient>

    <!-- Neon gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glassmorphism Effect -->
    <filter id="glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.2 0 0 0 0 0.4 0 0 0 0 0.6 0 0 0 0.2 0"
        result="glass"
      />
      <feBlend in="SourceGraphic" in2="glass" mode="normal" />
    </filter>

    <!-- Particle gradient -->
    <radialGradient id="particleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGradient)" />

  <!-- Left Section: Branding -->
  <g>
    <text x="50" y="100" fill="white" font-size="48" font-family="Segoe UI" font-weight="700">
      K. SANTHOSH
    </text>
    <text x="50" y="150" fill="#22D3EE" font-size="24" font-family="Segoe UI">
      Software Developer (Full Stack)
    </text>
    <text x="50" y="200" fill="#A855F7" font-size="24" font-family="Segoe UI">
      Application Builder
    </text>
    <text x="50" y="250" fill="#94A3B8" font-size="18" font-family="Segoe UI">
      Building scalable applications with clean code and modern technologies.
    </text>
  </g>

  <!-- Center Section: Workstation -->
  <g>
    <!-- Desk -->
    <path d="M600 400 Q800 380 1000 400 L1000 420 Q800 440 600 420 Z" fill="#0F172A" />

    <!-- Curved Ultrawide Monitor -->
    <path d="M650 200 Q800 150 950 200 L950 300 Q800 250 650 300 Z" fill="#1E293B" stroke="#22D3EE" stroke-width="2" />
    <rect x="750" y="220" width="100" height="40" fill="#050816" />
    <text x="760" y="245" fill="#22D3EE" font-size="14" font-family="Consolas">Code Editor</text>

    <!-- Laptop -->
    <path d="M700 320 Q750 310 800 320 L800 350 Q750 360 700 350 Z" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <text x="710" y="340" fill="#22D3EE" font-size="12" font-family="Consolas">Terminal</text>

    <!-- Mechanical Keyboard -->
    <path d="M650 370 Q800 360 950 370 L950 380 Q800 390 650 380 Z" fill="#0F172A" stroke="#22D3EE" stroke-width="1" />

    <!-- Mouse -->
    <ellipse cx="600" cy="380" rx="10" ry="5" fill="#22D3EE" />
  </g>

  <!-- Right Section: HUD -->
  <g>
    <rect x="1200" y="100" width="300" height="300" fill="#0F172A" stroke="#22D3EE" stroke-width="2" />
    <text x="1250" y="150" fill="#22D3EE" font-size="18" font-family="Consolas">
      SYSTEM STATUS
    </text>
    <text x="1250" y="200" fill="white" font-size="16">● CPU&nbsp;&nbsp;&nbsp;&nbsp;85%</text>
    <text x="1250" y="230" fill="white" font-size="16">● Memory&nbsp;&nbsp;70%</text>
    <text x="1250" y="260" fill="white" font-size="16">● Cloud&nbsp;&nbsp;&nbsp;&nbsp;Active</text>
    <text x="1250" y="290" fill="white" font-size="16">● Database&nbsp;Online</text>
    <text x="1250" y="320" fill="white" font-size="16">● APIs&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Active</text>
    <text x="1250" y="350" fill="white" font-size="16">● Git&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Synced</text>
    <text x="1250" y="380" fill="white" font-size="16">● AI&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Online</text>
  </g>

  <!-- Particles -->
  <g>
    <circle cx="200" cy="400" r="3" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="1400" cy="300" r="3" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="200" r="3" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="1;0;1" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>